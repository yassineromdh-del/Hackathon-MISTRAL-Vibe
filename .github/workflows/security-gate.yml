name: Security Gate

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Semgrep (full scan, JSON report)
        run: |
          semgrep scan --config auto --config .semgrep.yml \
            --json --output semgrep-results.json . || true

      - name: Upload Semgrep results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json
          retention-days: 7

      - name: Gate on ERROR findings
        run: |
          python3 - <<'EOF'
          import json, sys
          d = json.load(open('semgrep-results.json'))
          errors = [r for r in d.get('results', []) if r.get('extra', {}).get('severity') == 'ERROR']
          for r in errors:
              print(f"::error file={r['path']},line={r['start']['line']}::{r['check_id']}")
          print(f"{len(errors)} blocking finding(s), {len(d.get('results', []))} total")
          sys.exit(1 if errors else 0)
          EOF

  gitleaks:
    name: Gitleaks Secrets Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks (full git history, redacted report)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o gitleaks.tgz
          tar xzf gitleaks.tgz gitleaks
          # --log-opts=HEAD: only walk the current branch's history —
          # fetch-depth:0 pulls every branch, and without this a leak on a
          # demo branch would fail the gate on main too.
          ./gitleaks git --config .gitleaks.toml \
            --log-opts="--full-history HEAD" \
            --report-format json --report-path gitleaks-results.json \
            --redact --exit-code 1 .

      - name: Upload Gitleaks results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: gitleaks-results
          path: gitleaks-results.json
          retention-days: 7

  trivy:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          exit-code: 1
          ignore-unfixed: false
          severity: HIGH,CRITICAL
          format: json
          output: trivy-results.json

      - name: Upload Trivy results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 7

  security-gate:
    name: Security Gate Decision
    needs: [semgrep, gitleaks, trivy]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download scan artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        continue-on-error: true
        with:
          path: artifacts

      - name: Build gate report
        env:
          SEMGREP_RESULT: ${{ needs.semgrep.result }}
          GITLEAKS_RESULT: ${{ needs.gitleaks.result }}
          TRIVY_RESULT: ${{ needs.trivy.result }}
        run: |
          python3 - <<'EOF'
          import json, os, glob, datetime

          def load(pattern):
              for p in glob.glob(pattern):
                  try:
                      return json.load(open(p))
                  except Exception:
                      pass
              return None

          semgrep = load('artifacts/semgrep-results/semgrep-results.json')
          trivy = load('artifacts/trivy-results/trivy-results.json')
          gitleaks = load('artifacts/gitleaks-results/gitleaks-results.json')
          waivers = load('security/waivers.json') or []

          def semgrep_fix(rule):
              r = (rule or '').lower()
              if 'mutable-action-tag' in r:
                  return "Pin the GitHub Action to a full commit SHA (uses: owner/action@<sha> # tag) so the reference cannot be repointed."
              if 'dangerouslysetinnerhtml' in r or 'innerhtml' in r:
                  return "Sanitize the HTML with DOMPurify before injecting it, or render the content as plain text."
              if 'eval' in r or 'function' in r:
                  return "Remove eval()/new Function(); parse data with JSON.parse or use a safe, explicit code path."
              if 'secret' in r or 'hardcoded' in r or 'password' in r or 'token' in r:
                  return "Move the value to an environment variable, rotate the exposed credential, and purge it from git history."
              if 'sql' in r or 'injection' in r:
                  return "Use parameterized queries / prepared statements; never concatenate user input into queries."
              return f"Review and apply the rule guidance: https://semgrep.dev/r/{rule}"

          findings = []
          for r in (semgrep or {}).get('results', []):
              sev = r.get('extra', {}).get('severity')
              rule = r.get('check_id')
              findings.append({
                  'severity': sev,
                  'blocking': sev == 'ERROR',
                  'rule': rule,
                  'file': r.get('path'),
                  'line': r.get('start', {}).get('line'),
                  'message': (r.get('extra', {}).get('message') or '')[:300],
                  'remediation': semgrep_fix(rule),
              })

          vulns = []
          for res in (trivy or {}).get('Results') or []:
              for v in res.get('Vulnerabilities') or []:
                  fixed = v.get('FixedVersion')
                  pkg = v.get('PkgName')
                  vulns.append({
                      'severity': v.get('Severity'),
                      'blocking': v.get('Severity') in ('HIGH', 'CRITICAL'),
                      'id': v.get('VulnerabilityID'),
                      'package': pkg,
                      'installed': v.get('InstalledVersion'),
                      'fixed': fixed,
                      'title': (v.get('Title') or '')[:200],
                      'remediation': (
                          f"Upgrade {pkg} from {v.get('InstalledVersion')} to {fixed} (npm update / bump package.json)."
                          if fixed else
                          f"No fixed version yet for {pkg} — watch the advisory and consider replacing the package."
                      ),
                  })

          leaks = []
          for l in gitleaks or []:
              leaks.append({
                  'severity': 'CRITICAL',
                  'blocking': True,
                  'rule': l.get('RuleID'),
                  'file': l.get('File'),
                  'line': l.get('StartLine'),
                  'description': (l.get('Description') or '')[:200],
                  'commit': (l.get('Commit') or '')[:7],
                  'remediation': "Rotate the secret immediately, move it to an environment variable, purge it from git history (git filter-repo), then re-run the gate.",
              })

          # Vibe Security Score: 100 minus severity-weighted penalties.
          def weight(sev):
              return {'CRITICAL': 40, 'ERROR': 40, 'HIGH': 20,
                      'MEDIUM': 5, 'WARNING': 5, 'LOW': 1, 'INFO': 1}.get(sev or '', 5)

          penalty = sum(weight(f['severity']) for f in findings)
          penalty += sum(weight(v['severity']) for v in vulns)
          penalty += sum(weight(l['severity']) for l in leaks)
          penalty += 2 * len(waivers)  # a documented waiver still carries residual risk
          score = max(0, 100 - penalty)
          grade = next(g for g, t in
                       [('A+', 95), ('A', 85), ('B', 70), ('C', 50), ('D', 30), ('F', -1)]
                       if score >= t)

          report = {
              'score': score,
              'grade': grade,
              'sha': os.environ.get('GITHUB_SHA'),
              'run_id': os.environ.get('GITHUB_RUN_ID'),
              'generated_at': datetime.datetime.now(datetime.timezone.utc).isoformat(),
              'jobs': {
                  'semgrep': os.environ['SEMGREP_RESULT'],
                  'gitleaks': os.environ['GITLEAKS_RESULT'],
                  'trivy': os.environ['TRIVY_RESULT'],
              },
              'semgrep_findings': findings,
              'trivy_vulnerabilities': vulns,
              'gitleaks_leaks': leaks,
              'waivers': waivers,
          }
          os.makedirs('report', exist_ok=True)
          with open('report/latest.json', 'w') as f:
              json.dump(report, f, indent=1)
          print(f"report: grade {grade} ({score}/100) — {len(findings)} semgrep findings, {len(vulns)} trivy vulns, {len(leaks)} leaks")

          # Professional run summary rendered by GitHub above the raw logs.
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_path:
              ok = all(v == 'success' for v in report['jobs'].values())
              tone = {'A+': '🟢', 'A': '🟢', 'B': '🟡', 'C': '🟠', 'D': '🔴', 'F': '🔴'}[grade]
              rows = []
              for f in findings:
                  rows.append(('Semgrep', f['severity'], f"`{f['rule'].split('.')[-1]}`",
                               f"`{f['file']}:{f['line']}`", f['remediation']))
              for v in vulns:
                  rows.append(('Trivy', v['severity'], f"`{v['id']}`",
                               f"`{v['package']} {v['installed']}`", v['remediation']))
              for l in leaks:
                  rows.append(('Gitleaks', l['severity'], f"`{l['rule']}`",
                               f"`{l['file']}:{l['line']}`", l['remediation']))
              with open(summary_path, 'a') as s:
                  s.write(f"# 🛡️ Security Gate — {'OPEN ✅' if ok else 'BLOCKED ⛔'}\n\n")
                  s.write(f"## {tone} Vibe Security Score: **{grade}** ({score}/100)\n\n")
                  s.write(f"Commit `{report['sha'][:7]}` · {len(rows)} finding(s) · {len(waivers)} waiver(s)\n\n")
                  s.write("| Scan | Verdict |\n|---|---|\n")
                  for k, v in report['jobs'].items():
                      s.write(f"| {k.capitalize()} | {'✅' if v == 'success' else '❌'} {v} |\n")
                  if rows:
                      s.write("\n## Findings\n\n| Outil | Sévérité | Règle | Localisation | Remédiation |\n|---|---|---|---|---|\n")
                      for r in rows[:30]:
                          s.write('| ' + ' | '.join(str(c).replace('|', '\\|') for c in r) + ' |\n')
                  if waivers:
                      s.write("\n<details><summary>Faux positifs assumés (waivers)</summary>\n\n")
                      s.write("| Outil | Quoi | Pourquoi |\n|---|---|---|\n")
                      for w in waivers:
                          s.write(f"| {w.get('tool')} | {w.get('what')} | {w.get('why')} |\n")
                      s.write("\n</details>\n")
          EOF

      - name: Publish report to gate-reports branch
        run: |
          cd report
          git init -q -b gate-reports
          git config user.name "security-gate[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add latest.json
          git commit -q -m "gate report for ${GITHUB_SHA::7}"
          git push --force -q \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" \
            gate-reports

      - name: Self-healing — open fix-prompt issue when blocked
        if: needs.semgrep.result != 'success' || needs.gitleaks.result != 'success' || needs.trivy.result != 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/security_gate_bot.py open report/latest.json

      - name: Self-healing — close fixed issues when green
        if: needs.semgrep.result == 'success' && needs.gitleaks.result == 'success' && needs.trivy.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/security_gate_bot.py close

      - name: Evaluate gate
        run: |
          echo "Semgrep:  ${{ needs.semgrep.result }}"
          echo "Gitleaks: ${{ needs.gitleaks.result }}"
          echo "Trivy:    ${{ needs.trivy.result }}"
          if [ "${{ needs.semgrep.result }}" != "success" ] || \
             [ "${{ needs.gitleaks.result }}" != "success" ] || \
             [ "${{ needs.trivy.result }}" != "success" ]; then
            echo "::error::Security gate BLOCKED — at least one scan failed"
            exit 1
          fi
          echo "All security gates passed — safe to merge"
