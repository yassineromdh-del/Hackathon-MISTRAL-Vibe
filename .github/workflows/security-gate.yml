name: Security Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - run: semgrep --config=auto --error --json --output=semgrep-results.json .
        continue-on-error: true
      - name: Upload Semgrep results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  gitleaks:
    name: Gitleaks (Secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  trivy:
    name: Trivy (SCA)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'all'
          severity: 'CRITICAL,HIGH'

  # Gate aggregator - all must pass
  security-gate:
    name: Security Gate Result
    needs: [semgrep, gitleaks, trivy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all security gates
        run: |
          echo "Semgrep: ${{ needs.semgrep.result }}"
          echo "Gitleaks: ${{ needs.gitleaks.result }}"
          echo "Trivy: ${{ needs.trivy.result }}"
          
          if [ "${{ needs.semgrep.result }}" = "success" ] && \
             [ "${{ needs.gitleaks.result }}" = "success" ] && \
             [ "${{ needs.trivy.result }}" = "success" ]; then
            echo "✅ ALL SECURITY GATES PASSED"
            exit 0
          else
            echo "❌ SECURITY GATE FAILED"
            exit 1
          fi
