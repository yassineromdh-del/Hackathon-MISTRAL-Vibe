title = "Gitleaks Hackathon Config"

# Keep the full default ruleset (GitHub/AWS/Stripe tokens, private keys, JWTs,
# generic API keys…) and add project-specific rules on top.
[extend]
useDefault = true

[allowlist]
description = "Global allowlist"
paths = [
  '''node_modules/''',
  '''dist/''',
  '''package-lock\.json''',
]
# JWT header placeholder used in the old .env.example (commit 002bb0f) — not a secret
regexes = ['''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.\.\.''']

[[rules]]
id = "supabase-secret-key"
description = "Supabase secret / service-role key"
regex = '''sb_secret_[a-zA-Z0-9_\-]{20,}'''
tags = ["supabase", "key"]

[[rules]]
id = "supabase-legacy-service-role"
description = "Supabase legacy service_role JWT"
regex = '''eyJ[A-Za-z0-9_\-]+\.eyJ[^"']*service_role[^"']*\.[A-Za-z0-9_\-]+'''
tags = ["supabase", "jwt"]
